# Spec 005 — pin Robolectric to SDK 33 (TIRAMISU) for unit tests.
# Why not 36 (project targetSdk)? SDK 34+ emulation requires JDK 17 in the test
# task; SDK 36 needs JDK 21. Project's Kotlin toolchain is JDK 11. Pinning to
# SDK 33 lets tests run on the JDK 11 toolchain without forcing a bump.
# Room entity / DAO behaviour is SDK-independent for the surfaces we test
# (CRUD + observers + FK SET NULL).
sdk=33
