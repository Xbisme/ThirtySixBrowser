name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"

jobs:
  build:
    name: Build (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle (cache deps + build cache + wrapper)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Cache Android SDK build-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/build-cache
            ~/.android/cache
          key: android-sdk-cache-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: |
            android-sdk-cache-${{ runner.os }}-

      - run: chmod +x ./gradlew

      - name: Assemble debug
        # Add `assembleRelease` once a release signing config is set up
        run: ./gradlew assembleDebug --build-cache --stacktrace

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: ignore

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - run: chmod +x ./gradlew

      - name: Run unit tests (debug)
        # Add `testReleaseUnitTest` once a release signing config is set up
        run: ./gradlew testDebugUnitTest --build-cache --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/
          if-no-files-found: ignore

  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Cache Lint partials
        uses: actions/cache@v4
        with:
          path: |
            app/build/intermediates/lint_*
            app/build/intermediates/*lint*
          key: android-lint-${{ runner.os }}-${{ hashFiles('app/src/**/*.kt', 'app/src/**/*.xml', 'app/build.gradle.kts') }}
          restore-keys: |
            android-lint-${{ runner.os }}-

      - run: chmod +x ./gradlew

      - name: Run Android Lint (debug)
        # Switch to `lint` (runs all variants) once a release signing config is set up
        run: ./gradlew lintDebug --build-cache --stacktrace

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
            app/build/reports/lint-results-*.sarif
          if-no-files-found: ignore

  instrumented-test:
    name: Instrumented tests (emulator)
    # Disabled until a real UI test exists (Spec 007 webview-compose-wrapper or 011 tabs-management).
    # Currently only the default ExampleInstrumentedTest exists — not worth the emulator boot cost.
    # To re-enable: change `if: false` to `if: true` (or remove the line).
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        api-level: [29]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api${{ matrix.api-level }}-${{ runner.os }}

      - name: Create AVD snapshot (first run only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD snapshot generated"

      - run: chmod +x ./gradlew

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            ./gradlew connectedDebugAndroidTest --build-cache --stacktrace
            adb -s emulator-5554 emu kill || true

      - name: Force-kill emulator (workaround for hang on shutdown)
        if: always()
        run: |
          adb devices | grep emulator | cut -f1 | while read line; do
            adb -s "$line" emu kill || true
          done
          pkill -9 -f qemu-system || true
          pkill -9 -f crashpad_handler || true
          true

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report-api${{ matrix.api-level }}
          path: app/build/reports/androidTests/
          if-no-files-found: ignore
